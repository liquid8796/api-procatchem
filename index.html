<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROCatchem Lua Script API Docs</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111827'/%3E%3Ctext x='32' y='40' font-size='28' text-anchor='middle' fill='white'%3EP%3C/text%3E%3C/svg%3E" />
    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; padding: 0; overflow-x: hidden; }
      .topbar {
        font-family: Inter, Arial, sans-serif;
        background: #111827;
        color: white;
        min-height: 40px;
        padding: 0 20px;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
      }
      .topbar strong { font-size: 16px; line-height: 40px; white-space: nowrap; }
      .topbar nav { display: flex; gap: 14px; align-items: center; }
      .topbar a { color: #93c5fd; text-decoration: none; font-size: 13px; white-space: nowrap; }
      .topbar a:hover { text-decoration: underline; }
      redoc { display: block; }
      redoc [id] { scroll-margin-top: 56px; }
      @media (max-width: 640px) {
        .topbar { padding: 0 12px; }
        .topbar nav { gap: 10px; }
        .topbar strong { font-size: 14px; }
        .topbar a { font-size: 12px; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <strong>PROCatchem Lua Script API</strong>
      <nav aria-label="Documentation shortcuts">
        <a href="./openapi.yaml">OpenAPI YAML</a>
        <a href="./examples/basic-script.lua">Basic example</a>
        <a href="./examples/notification-script.lua">Notification example</a>
      </nav>
    </header>
    <redoc id="api-docs" spec-url="./openapi.yaml" hide-download-button="false" expand-responses="200,204" scroll-y-offset=".topbar"></redoc>
    <noscript>Please enable JavaScript to view the interactive Redoc API reference. The raw OpenAPI source is available at /openapi.yaml.</noscript>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
<script>
      (function () {
        var NAV_ATTEMPTS_MS = [30, 120, 260, 520, 900, 1500];

        function getHeaderOffset() {
          var topbar = document.querySelector('.topbar');
          return topbar ? Math.ceil(topbar.getBoundingClientRect().height || 0) + 12 : 0;
        }

        function getRedocRoot() {
          return document.getElementById('api-docs') || document.querySelector('redoc');
        }

        function cssEscape(value) {
          if (window.CSS && typeof window.CSS.escape === 'function') {
            return window.CSS.escape(value);
          }

          return String(value).replace(/[^a-zA-Z0-9_-]/g, function (character) {
            return '\\' + character;
          });
        }

        function getHashId() {
          return decodeURIComponent((window.location.hash || '').replace(/^#/, ''));
        }

        function getRedocMenuItemId(target) {
          if (!target || !target.closest) {
            return '';
          }

          var root = getRedocRoot();
          var item = target.closest('[data-item-id]');
          if (!item || (root && !root.contains(item))) {
            return '';
          }

          return item.getAttribute('data-item-id') || '';
        }

        function isLayouted(element) {
          if (!element || element.nodeType !== 1) {
            return false;
          }

          var rect = element.getBoundingClientRect();
          return rect.width > 0 && rect.height > 0;
        }

        function isSidebarNode(element) {
          return !!(element && element.closest && element.closest('[role="menu"], [data-item-id][role="menuitem"]'));
        }

        function findContentSectionById(id) {
          if (!id) {
            return null;
          }

          try {
            var selector = 'redoc [data-section-id="' + cssEscape(id) + '"], redoc [id="' + cssEscape(id) + '"]';
            var nodes = document.querySelectorAll(selector);
            var best = null;
            var bestScore = -Infinity;

            for (var i = 0; i < nodes.length; i += 1) {
              var node = nodes[i];
              if (!isLayouted(node) || isSidebarNode(node)) {
                continue;
              }

              var rect = node.getBoundingClientRect();
              var score = rect.width + Math.max(0, rect.left);
              if (score > bestScore) {
                best = node;
                bestScore = score;
              }
            }

            return best;
          } catch (error) {
            return null;
          }
        }

        function getScrollParent(element) {
          var parent = element ? element.parentElement : null;
          while (parent && parent !== document.body && parent !== document.documentElement) {
            var style = window.getComputedStyle(parent);
            var overflowY = style.overflowY || '';
            if (/(auto|scroll|overlay)/.test(overflowY) && parent.scrollHeight > parent.clientHeight + 4) {
              return parent;
            }
            parent = parent.parentElement;
          }
          return window;
        }

        function scrollToContentSection(section) {
          if (!section) {
            return false;
          }

          var offset = getHeaderOffset();
          var scroller = getScrollParent(section);

          if (scroller === window) {
            section.scrollIntoView({ block: 'start', inline: 'nearest', behavior: 'auto' });
            if (offset > 0) {
              window.scrollBy(0, -offset);
            }
            return true;
          }

          var sectionRect = section.getBoundingClientRect();
          var scrollerRect = scroller.getBoundingClientRect();
          var top = scroller.scrollTop + sectionRect.top - scrollerRect.top - offset;
          if (top < 0) {
            top = 0;
          }
          scroller.scrollTo({ top: top, left: 0, behavior: 'auto' });
          return true;
        }

        function attemptNavigate(itemId) {
          var activeId = getHashId() || itemId;
          var section = findContentSectionById(activeId);
          scrollToContentSection(section);
        }

        function scheduleNavigate(itemId) {
          NAV_ATTEMPTS_MS.forEach(function (delay) {
            window.setTimeout(function () {
              window.requestAnimationFrame(function () {
                attemptNavigate(itemId);
              });
            }, delay);
          });
        }

        document.addEventListener('click', function (event) {
          var itemId = getRedocMenuItemId(event.target);
          if (!itemId) {
            return;
          }

          // Redoc changes the URL with history.pushState, which does not fire the
          // browser hashchange event. Capture the sidebar click, then scroll after
          // Redoc has activated the item and rendered the matching content section.
          scheduleNavigate(itemId);
        }, true);

        window.addEventListener('hashchange', function () {
          var id = getHashId();
          if (id) {
            scheduleNavigate(id);
          }
        });

        window.addEventListener('popstate', function () {
          var id = getHashId();
          if (id) {
            scheduleNavigate(id);
          }
        });

        window.addEventListener('load', function () {
          var id = getHashId();
          if (id) {
            scheduleNavigate(id);
          }
        });
      })();
    </script>

  </body>
</html>
