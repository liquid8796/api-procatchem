      - lang: Lua
        source: local ok = sendNotification("Shiny found")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateName:
                  type: string
                  description: Template display name or stable template id.
              required:
              - templateName
            example:
              templateName: Shiny found
  /lua/notifications/sendnotificationwith:
