      summary: sendNotificationWith()
      description: '**Lua global function**


        ```lua

        result = sendNotificationWith(templateName, values)

        ```


        Send a configured notification template and override/add template variables
        using a Lua table. Table keys should match template variables without braces.
        Per-call values override built-ins, runtime variables set by `setNotifyVar`,
        global variables, and template defaults.'
      responses:
        '200':
          description: Lua return value.
          content:
            application/json:
              schema:
                type: boolean
              example: true
      x-lua-signature: result = sendNotificationWith(templateName, values)
      x-codeSamples:
      - lang: Lua
        source: local ok = sendNotificationWith("Shiny found", { pokemon = "Gyarados",
          level = "30" })
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateName:
                  type: string
                  description: Template display name or stable template id.
                values:
                  $ref: '#/components/schemas/NotificationVariables'
              required:
              - templateName
              - values
            example:
              templateName: Shiny found
              values:
                pokemon: Gyarados
                level: '30'
                map: Route 22
