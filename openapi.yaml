      tags:
      - General state
      operationId: setWaterMount
      summary: setWaterMount()
      description: '**Lua global function**


        ```lua

        result = setWaterMount(mount)

        ```


        Configure an optional water mount item that should be used when the bot needs
        to start surfing. Call this before a path that may enter water. Most scripts
        can leave it unset; without a water mount, `useSurf()` and pathfinding use
        the normal `/surf` flow. Pass an empty string to clear the configured water
        mount.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mount:
                  type: string
              required:
              - mount
            example:
              mount: Lapras Mount
      responses:
