      operationId: sendNotification
      summary: sendNotification()
      description: '**Lua global function**


        ```lua

        result = sendNotification(templateName)

        ```


        Send a configured notification template by name or id. Built-in variables
        such as `{player}`, `{map}`, `{x}`, `{y}`, `{account}`, `{server}`, `{bot}`,
        `{time}`, `{date}`, and `{datetime}` are filled automatically when available.
        The template''s configured target controls whether it goes to personal Discord,
        the built-in PROCatchem Discord channel, Telegram, or all enabled channels.
        Returns `false` only when notifications are disabled or the template cannot
        be found; network delivery is asynchronous.'
      responses:
        '200':
          description: Lua return value.
          content:
            application/json:
              schema:
                type: boolean
              example: true
      x-lua-signature: result = sendNotification(templateName)
