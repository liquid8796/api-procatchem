openapi: 3.1.0
info:
  title: PROCatchem Lua Script API
  summary: Lua API reference for PROCatchem script authors, including notification
    helpers.
  version: 1.0.100
  description: "This documentation describes the Lua functions exposed by PROCatchem\
    \ to user scripts.\n\nThe API is represented as OpenAPI pseudo-endpoints so it\
    \ can be rendered with Redoc/Redocly and deployed as a static documentation site.\
    \ These are not HTTP endpoints. Each operation describes one Lua global function\
    \ or script callback.\n\nNew notification helpers let scripts send configured\
    \ Discord/Telegram notification templates, pass template variables, override delivery\
    \ targets, and send quick plain-text alerts from Lua.\n\nBasic script shape:\n\
    \n```lua\nname = \"Example Script\"\nauthor = \"YourName\"\ndescription = \"Simple\
    \ PROCatchem script.\"\n\nfunction onPathAction()\n    if getMapName() == \"Viridian\
    \ City\" then\n        moveToGrass()\n    end\nend\n\nfunction onBattleAction()\n\
    \    attack()\nend\n```\n\nAction rule: a script should execute at most one path\
    \ or battle action per frame. Query/helper functions can be called freely.\n\n\
    PC storage helpers document the current official storage flow: open with `usePC()`,\
    \ refresh or open a box, then use one-based indexes for the visible team/box order.\
    \ PC updates are asynchronous; after deposit, withdraw, swap, internal box swap,\
    \ or release, wait for `isCurrentPCBoxRefreshed()` or re-check the relevant PC/team\
    \ state before issuing the next dependent action."
servers:
- url: lua://PROCatchem
  description: Pseudo server used only to render Lua function documentation.
tags:
- name: Script metadata
  description: Top-level Lua fields read by the script loader.
- name: Lifecycle callbacks
  description: Functions implemented by your script and called by the bot runtime.
- name: Core utilities
  description: Logging, relog/restart helpers, hooks and utility helpers.
- name: Map and NPC
  description: Map, cell, NPC, discoverable object and position helpers.
- name: General state
  description: Account, player, time, server and global game state helpers.
- name: Team Pokémon
  description: Current party/team Pokémon getters and team-level helpers.
- name: Items and shop
  description: Inventory, item usage and shop helpers.
- name: PC storage
  description: PC box query and management helpers.
- name: Battle state
  description: Current battle and opponent query helpers.
- name: Path actions
  description: Movement, NPC interaction, team ordering, PC and overworld actions.
- name: Dialog functions
  description: Dialog answer helpers.
- name: Battle actions
  description: Battle-only actions.
- name: Bot configuration
  description: AFK bot behavior configuration helpers.
- name: Move learning actions
  description: Move learning callbacks/actions.
- name: Custom options
  description: Script-defined UI options exposed in the tool.
- name: File APIs
  description: Read/write helpers for script-local files.
- name: Chat
  description: Chat/channel helpers.
- name: Notifications
  description: Discord and Telegram notification helpers for Lua scripts.
- name: Legacy special actions
  description: Legacy or special-purpose actions.
components:
  schemas:
    LuaValue:
      description: Any Lua-compatible value.
      oneOf:
      - type: string
      - type: number
      - type: boolean
      - type: object
      - type: array
        items: {}
    Position:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer
      required:
      - x
      - y
    NpcData:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/LuaValue'
    PokemonTypes:
      type: array
      items:
        type: string
      minItems: 0
      maxItems: 2
    NotificationVariables:
      type: object
      description: Lua table of template variable values. Keys are variable names
        without braces, e.g. pokemon for {pokemon}. Values are converted to strings.
      additionalProperties:
        type: string
      example:
        pokemon: Gyarados
        level: '30'
        map: Route 22
    NotificationTarget:
      type: string
      description: Notification delivery target override. personal/discord sends only
        to the user Discord webhook, procatchem sends only to the built-in PROCatchem
        Discord channel, telegram sends only to Telegram, and all uses the template
        configured target.
      enum:
      - personal
      - discord
      - procatchem
      - telegram
      - all
      example: procatchem
